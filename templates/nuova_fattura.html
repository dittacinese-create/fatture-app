{% extends "base.html" %}
{% block content %}

<div class="topbar">
    <h1>Nuova fattura</h1>
    <a href="/fatture" class="btn">← Torna alle fatture</a>
</div>

<div class="card" style="max-width: 600px;">
    <form method="POST" action="/nuova_fattura" id="form_nuova_fattura">
        <div class="form-row">
            <div class="form-group">
                <label>Numero fattura *</label>
                <input type="text" name="numero" value="{{ prossimo_numero }}" required>
            </div>
            <div class="form-group">
                <label>Data *</label>
                <input type="date" name="data" value="{{ data_oggi }}" required>
            </div>
        </div>

        <!-- SELEZIONE CLIENTE -->
        <div class="form-group">
            <label style="display:flex; justify-content:space-between; align-items:center;">
                <span>Cliente *</span>
                <button type="button" onclick="toggleVistaCliente()" id="btn_toggle_cliente"
                        style="font-size:11px; padding:2px 8px; border:1px solid #d0d5dd; border-radius:20px; background:white; cursor:pointer; color:#6b7280;">
                    📋 Vista ricerca
                </button>
            </label>

            <!-- Vista Bottoni Rapidi (Predefinita) -->
            <div id="cliente_bottoni" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:5px;">
                {% for c in clienti %}
                <button type="button" class="campo-inline btn-seleziona-cliente" 
                        data-id="{{ c.id }}"
                        onclick="selezionaClienteBottoni({{ c.id }}, this)"
                        style="cursor:pointer; background:white; padding:8px 12px; border-radius:8px; font-size:13px; border:1px solid #d0d5dd; font-weight:500; transition:all 0.2s;">
                    {{ c.nome }}
                </button>
                {% endfor %}
            </div>

            <!-- Vista Ricerca Testuale (Nascosta) -->
            <div id="cliente_ricerca" style="display:none; margin-top:5px; position:relative;">
                <input type="text" id="search_cliente_input" placeholder="Digita per cercare un cliente..." autocomplete="off" style="width:100%;">
                <div id="lista_clienti_autocomplete" class="autocomplete-list" style="position:absolute; width:100%; top:100%; left:0; z-index:99; background:white; border:1px solid #d0d5dd; display:none; max-height:200px; overflow-y:auto;">
                    {% for c in clienti %}
                    <div data-id="{{ c.id }}" data-nome="{{ c.nome | lower }}" class="item-cliente-search" style="padding:8px 10px; cursor:pointer; font-size:13px;">
                        {{ c.nome }}
                    </div>
                    {% endfor %}
                </div>
            </div>

            <input type="hidden" name="cliente_id" id="cliente_id_hidden" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Tipo fattura *</label>
                <select name="tipo" required>
                    <option value="FORNITURA">Fornitura (da DDT)</option>
                    <option value="MANUALE">Manuale</option>
                </select>
            </div>
            <div class="form-group">
                <label>Regime IVA *</label>
                <select name="regime_iva" required>
                    <option value="22">IVA 22%</option>
                    <option value="RC">Reverse Charge (0%)</option>
                    <option value="0">Esente (0%)</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Banca di accredito *</label>
            <select name="banca_id" required>
                {% for b in banche %}
                <option value="{{ b.id }}">{{ b.nome }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:1rem;">Crea fattura →</button>
    </form>
</div>

<script>
function toggleVistaCliente() {
    const bottoni = document.getElementById("cliente_bottoni");
    const ricerca = document.getElementById("cliente_ricerca");
    const btn = document.getElementById("btn_toggle_cliente");
    
    if (bottoni.style.display !== "none") {
        bottoni.style.display = "none";
        ricerca.style.display = "block";
        btn.textContent = "📋 Vista bottoni";
    } else {
        bottoni.style.display = "flex";
        ricerca.style.display = "none";
        btn.textContent = "📋 Vista ricerca";
    }
}

function selezionaClienteBottoni(id, elemento) {
    document.getElementById("cliente_id_hidden").value = id;
    document.querySelectorAll(".btn-seleziona-cliente").forEach(b => {
        b.style.background = "white";
        b.style.borderColor = "#d0d5dd";
        b.style.color = "initial";
    });
    elemento.style.background = "#1a1a2e";
    elemento.style.borderColor = "#1a1a2e";
    elemento.style.color = "white";
}

document.addEventListener("DOMContentLoaded", function() {
    const input = document.getElementById("search_cliente_input");
    const lista = document.getElementById("lista_clienti_autocomplete");
    const items = document.querySelectorAll(".item-cliente-search");
    const hidden = document.getElementById("cliente_id_hidden");

    if (input) {
        input.addEventListener("input", function() {
            const query = this.value.toLowerCase().trim();
            if (!query) { lista.style.display = "none"; return; }
            
            let contatore = 0;
            items.forEach(item => {
                if (item.getAttribute("data-nome").includes(query)) {
                    item.style.display = "block";
                    contatore++;
                } else {
                    item.style.display = "none";
                }
            });
            lista.style.display = contatore > 0 ? "block" : "none";
        });

        items.forEach(item => {
            item.addEventListener("click", function() {
                input.value = this.textContent.trim();
                hidden.value = this.getAttribute("data-id");
                lista.style.display = "none";
            });
        });

        document.addEventListener("click", function(e) {
            if (!input.contains(e.target) && !lista.contains(e.target)) {
                lista.style.display = "none";
            }
        });
    }
});
</script>

{% endblock %}
