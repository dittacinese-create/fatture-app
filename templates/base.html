<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Fatture</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .hamburger {
            display: none;
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 200;
            background: #1a1a2e;
            border: none;
            color: white;
            font-size: 20px;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 99;
        }
        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.25s ease;
                z-index: 150;
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .main { margin-left: 0; padding: 1rem; padding-top: 60px; }
        }
    </style>
</head>
<body>

<button class="hamburger" onclick="toggleMenu()" id="hamburger">☰</button>
<div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <span>🧾</span> Fatture
    </div>
    <nav>
        <a href="/fatture" class="{{ 'active' if request.path.startswith('/fattur') else '' }}" onclick="closeMenu()">
            <span class="icon">📄</span> Fatture
        </a>
        <a href="/clienti" class="{{ 'active' if request.path.startswith('/client') else '' }}" onclick="closeMenu()">
            <span class="icon">👥</span> Clienti
        </a>
        <a href="/prodotti" class="{{ 'active' if request.path == '/prodotti' else '' }}" onclick="closeMenu()">
            <span class="icon">📦</span> Prodotti
        </a>
        <a href="/note" class="{{ 'active' if request.path == '/note' else '' }}" onclick="closeMenu()">
            <span class="icon">📝</span> Note
        </a>
    </nav>
</div>

<div class="main">
    {% block content %}{% endblock %}
</div>

<script>
function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("open");
}
function closeMenu() {
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("overlay").classList.remove("open");
}
</script>

</body>
</html>
