<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Fatture</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .hamburger {
            display: none;
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 200;
            background: #1a1a2e;
            border: none;
            color: white;
            font-size: 20px;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 99;
        }
        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.25s ease;
                z-index: 150;
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .main { margin-left: 0; padding: 1rem; padding-top: 60px; }
        }
    </style>
</head>
<body>

<button class="hamburger" onclick="toggleMenu()" id="hamburger">☰</button>
<div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <span>🧾</span> Fatture
    </div>
    <nav>
        <a href="/fatture" class="{{ 'active' if request.path.startswith('/fattur') else '' }}" onclick="closeMenu()">
            <span class="icon">📄</span> Fatture
        </a>
        
        <!-- DASHBOARD ANALISI -->
        <a href="/dashboard" class="{{ 'active' if request.path == '/dashboard' else '' }}" onclick="closeMenu()">
            <span class="icon">📊</span> Dashboard
        </a>
        
        <a href="/clienti" class="{{ 'active' if request.path.startswith('/client') else '' }}" onclick="closeMenu()">
            <span class="icon">👥</span> Clienti
        </a>
        <a href="/prodotti" class="{{ 'active' if request.path == '/prodotti' else '' }}" onclick="closeMenu()">
            <span class="icon">📦</span> Prodotti
        </a>
        <a href="/note" class="{{ 'active' if request.path == '/note' else '' }}" onclick="closeMenu()">
            <span class="icon">📝</span> Note
        </a>
    </nav>
    <div style="padding:1rem 1.25rem; border-top:1px solid rgba(255,255,255,0.08); margin-top:auto;">
        <a href="/logout" style="display:flex; align-items:center; gap:10px; color:rgba(255,255,255,0.5); text-decoration:none; font-size:13px;">
            <span>🚪</span> Esci
        </a>
    </div>
</div>

<div class="main">
    {% block content %}{% endblock %}
</div>

<!-- ================================================================= -->
<!-- MODALE GRAFICA REUSABILE PER SICUREZZA ELIMINAZIONE -->
<!-- ================================================================= -->
<div id="modalPasswordEliminazione" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:#fff; padding:24px; border-radius:12px; max-width:400px; width:90%; box-shadow:0 10px 25px rgba(0,0,0,0.2);">
        <h3 style="margin-top:0; color:#1a1a2e; font-size:18px;">🔒 Password di Sicurezza</h3>
        <p style="color:#6b7280; font-size:14px; margin-bottom:15px;" id="testo_conferma_elimina">Confermi di voler procedere con l'eliminazione?</p>
        
        <input type="password" id="input_password_elimina" placeholder="Inserisci password..." style="width:100%; padding:10px 12px; margin-bottom:15px; border:1px solid #d0d5dd; border-radius:6px; box-sizing:border-box; font-size:14px;" onkeypress="if(event.key === 'Enter') confermaEliminazioneConPassword();">
        
        <div style="display:flex; justify-content:flex-end; gap:10px;">
            <button type="button" onclick="chiudiModalEliminazione()" class="btn" style="background:#f3f4f6; color:#374151; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">Annulla</button>
            <button type="button" onclick="confermaEliminazioneConPassword()" class="btn danger" style="background:#dc2626; color:#fff; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">Conferma ed Elimina</button>
        </div>
    </div>
</div>

<script>
/* --- GESTIONE SIDEBAR --- */
function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("open");
}
function closeMenu() {
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("overlay").classList.remove("open");
}

/* --- GESTIONE MODALE SICUREZZA ELIMINAZIONE --- */
let urlEliminazioneCorrente = "";

function richiediPasswordEliminazione(nomeElemento, urlEliminazione) {
    urlEliminazioneCorrente = urlEliminazione;
    document.getElementById("testo_conferma_elimina").textContent = "Confermi di voler eliminare " + nomeElemento + "?";
    document.getElementById("input_password_elimina").value = "";
    document.getElementById("modalPasswordEliminazione").style.display = "flex";
    setTimeout(() => document.getElementById("input_password_elimina").focus(), 100);
    return false; // Blocca la navigazione immediata
}

function chiudiModalEliminazione() {
    document.getElementById("modalPasswordEliminazione").style.display = "none";
    urlEliminazioneCorrente = "";
}

function confermaEliminazioneConPassword() {
    const password = document.getElementById("input_password_elimina").value;
    
    if(!password) {
        alert("Inserisci la password!");
        return;
    }

    // Chiamata AJAX al backend Flask per la verifica
    fetch("/verifica_password_eliminazione", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: password })
    })
    .then(response => {
        if (response.ok) {
            window.location.href = urlEliminazioneCorrente;
        } else {
            alert("Password errata! Eliminazione annullata.");
        }
    })
    .catch(error => {
        console.error("Errore:", error);
        alert("Si è verificato un errore durante la verifica.");
    });
}
</script>

</body>
</html>
