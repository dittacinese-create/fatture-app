{% extends "base.html" %}
{% block content %}

<div class="topbar">
    <h1>Fatture</h1>
    <a href="/nuova_fattura" class="btn btn-primary">+ Nuova fattura</a>
</div>

<!-- FILTRI E CONTROLLO ZOOM -->
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem; flex-wrap:wrap; gap:1rem;">
    <!-- FILTRI -->
    <div style="display:flex; gap:1rem; flex-wrap:wrap; align-items:center;">
        <div class="search-bar" style="margin-bottom:0;">
            <span class="search-icon">🔍</span>
            <input type="text"
                   id="filtro_cliente"
                   placeholder="Cerca cliente..."
                   oninput="filtraFatture()"
                   autocomplete="off">
        </div>
        
        <select id="filtro_stato" onchange="filtraFatture()"
                style="padding:8px 12px; border:1px solid #d0d5dd; border-radius:8px; font-size:13.5px; background:#fff; color:#1a1a2e; cursor:pointer;">
            <option value="">Tutti gli stati</option>
            <option value="pagata">Pagata</option>
            <option value="pagato">Pagato</option>
            <option value="parziale">Parziale</option>
            <option value="non pagata">Non pagata</option>
        </select>

        <select id="filtro_tipo" onchange="filtraFatture()"
                style="padding:8px 12px; border:1px solid #d0d5dd; border-radius:8px; font-size:13.5px; background:#fff; color:#1a1a2e; cursor:pointer;">
            <option value="">Tutti i tipi</option>
            <option value="fornitura">Fornitura</option>
            <option value="manuale">Manuale</option>
        </select>
        <button onclick="resetFiltri()" class="btn" style="font-size:13px;">✕ Reset</button>
    </div>

    <!-- CONTROLLI ZOOM TABELLA -->
    <div style="display: flex; align-items: center; gap: 6px; background: #ffffff; padding: 4px 8px; border-radius: 8px; border: 1px solid #d0d5dd;">
        <span style="font-size: 12px; color: #6b7280; font-weight: 500;">Zoom:</span>
        <button type="button" onclick="zoomTabella(-0.1)" class="btn" style="padding: 2px 8px; font-size: 12px; font-weight: bold; background: #f3f4f6;">-</button>
        <span id="zoom_val" style="font-size: 12px; font-weight: 600; min-width: 38px; text-align: center;">100%</span>
        <button type="button" onclick="zoomTabella(0.1)" class="btn" style="padding: 2px 8px; font-size: 12px; font-weight: bold; background: #f3f4f6;">+</button>
        <button type="button" onclick="resetZoomTabella()" class="btn" style="padding: 2px 8px; font-size: 11px; background: #e5e7eb;">Reset</button>
    </div>
</div>

<!-- FILTRI E CONTROLLO ZOOM (TUTTO A SINISTRA) -->
<div style="display:flex; gap:1rem; margin-bottom:1.25rem; flex-wrap:wrap; align-items:center;">
    <!-- CONTROLLI ZOOM -->
    <div style="display: flex; align-items: center; gap: 6px; background: #ffffff; padding: 6px 10px; border-radius: 8px; border: 1px solid #d0d5dd;">
        <span style="font-size: 13px; color: #6b7280; font-weight: 500;">Zoom:</span>
        <button type="button" onclick="zoomTabella(-0.1)" class="btn" style="padding: 2px 8px; font-size: 12px; font-weight: bold; background: #f3f4f6;">-</button>
        <span id="zoom_val" style="font-size: 12px; font-weight: 600; min-width: 38px; text-align: center;">100%</span>
        <button type="button" onclick="zoomTabella(0.1)" class="btn" style="padding: 2px 8px; font-size: 12px; font-weight: bold; background: #f3f4f6;">+</button>
        <button type="button" onclick="resetZoomTabella()" class="btn" style="padding: 2px 8px; font-size: 11px; background: #e5e7eb;">Reset</button>
    </div>

    <div class="search-bar" style="margin-bottom:0;">
        <span class="search-icon">🔍</span>
        <input type="text"
               id="filtro_cliente"
               placeholder="Cerca cliente..."
               oninput="filtraFatture()"
               autocomplete="off">
    </div>
    
    <select id="filtro_stato" onchange="filtraFatture()"
            style="padding:8px 12px; border:1px solid #d0d5dd; border-radius:8px; font-size:13.5px; background:#fff; color:#1a1a2e; cursor:pointer;">
        <option value="">Tutti gli stati</option>
        <option value="pagata">Pagata</option>
        <option value="pagato">Pagato</option>
        <option value="parziale">Parziale</option>
        <option value="non pagata">Non pagata</option>
    </select>

    <select id="filtro_tipo" onchange="filtraFatture()"
            style="padding:8px 12px; border:1px solid #d0d5dd; border-radius:8px; font-size:13.5px; background:#fff; color:#1a1a2e; cursor:pointer;">
        <option value="">Tutti i tipi</option>
        <option value="fornitura">Fornitura</option>
        <option value="manuale">Manuale</option>
    </select>
    <button onclick="resetFiltri()" class="btn" style="font-size:13px;">✕ Reset filtri</button>
</div>

<script>
const passwordCorretta = "{{ password_eliminazione }}";

/* --- GESTIONE ZOOM TABELLA --- */
let currentZoom = 1.0;

function zoomTabella(delta) {
    currentZoom = Math.min(Math.max(0.6, currentZoom + delta), 1.4);
    applicazoom();
}

function resetZoomTabella() {
    currentZoom = 1.0;
    applicazoom();
}

function applicazoom() {
    const container = document.getElementById("tabella_fatture_container");
    const label = document.getElementById("zoom_val");
    if(container) {
        container.style.transform = `scale(${currentZoom})`;
        container.style.width = `${100 / currentZoom}%`;
    }
    if(label) {
        label.textContent = `${Math.round(currentZoom * 100)}%`;
    }
}

/* --- GESTIONE ELIMINAZIONE & FILTRI --- */
function richiediPasswordEliminazione(numeroFattura) {
    if (!confirm("Sei sicuro di voler eliminare la fattura n. " + numeroFattura + "?")) {
        return false;
    }
    
    const passwordInserita = prompt("Inserisci la password di sicurezza per completare l'eliminazione:");
    
    if (passwordInserita === null) {
        return false; 
    }
    
    if (passwordInserita === passwordCorretta) {
        return true; 
    } else {
        alert("Password errata! Eliminazione annullata.");
        return false; 
    }
}

function filtraFatture() {
    var cliente = document.getElementById("filtro_cliente").value.toLowerCase().trim();
    var stato = document.getElementById("filtro_stato").value; 
    var tipo = document.getElementById("filtro_tipo").value;
    
    var righe = document.querySelectorAll("#tabella_fatture tbody tr.riga-dati");
    var visibili = 0;
    
    righe.forEach(function(riga) {
        var matchCliente = !cliente || (riga.dataset.cliente && riga.dataset.cliente.includes(cliente));
        var matchStato = !stato || riga.dataset.stato === stato || (stato === "pagata" && riga.dataset.stato === "pagato");
        var matchTipo = !tipo || riga.dataset.tipo === tipo;
        
        if (matchCliente && matchStato && matchTipo) {
            riga.style.display = "";
            visibili++;
        } else {
            riga.style.display = "none";
        }
    });
    
    var avvisoNessunRisultato = document.getElementById("nessun_risultato");
    if (avvisoNessunRisultato) {
        avvisoNessunRisultato.style.display = (righe.length > 0 && visibili === 0) ? "" : "none";
    }
}

function resetFiltri() {
    document.getElementById("filtro_cliente").value = "";
    document.getElementById("filtro_stato").value = "";
    document.getElementById("filtro_tipo").value = "";
    filtraFatture();
}
</script>

{% endblock %}
